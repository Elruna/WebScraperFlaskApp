{% extends 'base.html' %}
{% block content %}
    <h2>Extract Opinions from Ceneo</h2>
    <p>Provide a valid numeric Ceneo Product Code (e.g., <code>16978985</code>) below.</p>
    
    <form method="POST" action="{{ url_for('extract') }}">
        <div style="margin-bottom: 15px;">
            <label for="product_id" style="display:block; font-weight:bold; margin-bottom:5px;">Ceneo Product ID:</label>
            <input type="text" id="product_id" name="product_id" placeholder="e.g. 16978985" style="width: 300px; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px;">
        </div>
        <button type="submit" class="btn">Start Extraction Process</button>
    </form>
{% endblock %}
